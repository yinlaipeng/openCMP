<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="960" height="700">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  <!-- White background -->
  <rect width="960" height="700" fill="#ffffff"/>
  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" fill="#111827" font-size="18" font-weight="600">openCMP 多云管理平台系统架构</text>
  <!-- Layer 1: User Layer -->
  <rect x="40" y="60" width="880" height="50" rx="6" fill="#eff6ff" fill-opacity="0.5" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="52" y="78" fill="#6b7280" font-size="10" font-weight="600">用户接入层</text>
  <rect x="160" y="68" width="120" height="36" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="220" y="90" text-anchor="middle" fill="#111827" font-size="13">Web浏览器</text>
  <rect x="320" y="68" width="120" height="36" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="380" y="90" text-anchor="middle" fill="#111827" font-size="13">移动端APP</text>
  <rect x="480" y="68" width="120" height="36" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="540" y="90" text-anchor="middle" fill="#111827" font-size="13">第三方对接</text>
  <!-- Layer 2: Gateway Layer -->
  <rect x="40" y="130" width="880" height="50" rx="6" fill="#f0fdf4" fill-opacity="0.5" stroke="#86efac" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="52" y="148" fill="#6b7280" font-size="10" font-weight="600">网关接入层</text>
  <polygon points="480,135 520,152 520,168 480,185 440,168 440,152" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="480" y="166" text-anchor="middle" fill="#111827" font-size="11">Nginx</text>
  <rect x="560" y="138" width="160" height="36" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="640" y="160" text-anchor="middle" fill="#111827" font-size="12">Gin中间件</text>
  <text x="640" y="172" text-anchor="middle" fill="#6b7280" font-size="9">JWT/权限/隔离</text>
  <!-- Layer 3: Service Layer -->
  <rect x="40" y="200" width="880" height="140" rx="6" fill="#fef2f2" fill-opacity="0.3" stroke="#fecaca" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="52" y="218" fill="#6b7280" font-size="10" font-weight="600">业务服务层 (Go + Gin + GORM)</text>
  <rect x="80" y="230" width="100" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="130" y="255" text-anchor="middle" fill="#111827" font-size="12">用户模块</text>
  <rect x="200" y="230" width="100" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="250" y="255" text-anchor="middle" fill="#111827" font-size="12">项目模块</text>
  <rect x="320" y="230" width="100" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="370" y="255" text-anchor="middle" fill="#111827" font-size="12">权限模块</text>
  <rect x="440" y="230" width="100" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="490" y="255" text-anchor="middle" fill="#111827" font-size="12">资源模块</text>
  <rect x="560" y="230" width="100" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="610" y="255" text-anchor="middle" fill="#111827" font-size="12">账单模块</text>
  <rect x="680" y="230" width="100" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="730" y="255" text-anchor="middle" fill="#111827" font-size="12">消息模块</text>
  <rect x="800" y="230" width="100" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="850" y="255" text-anchor="middle" fill="#111827" font-size="12">审计模块</text>
  <rect x="200" y="290" width="140" height="40" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="270" y="315" text-anchor="middle" fill="#111827" font-size="12">云账号管理</text>
  <rect x="360" y="290" width="140" height="40" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="430" y="315" text-anchor="middle" fill="#111827" font-size="12">同步策略管理</text>
  <rect x="520" y="290" width="140" height="40" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="590" y="315" text-anchor="middle" fill="#111827" font-size="12">定时任务管理</text>
  <rect x="680" y="290" width="140" height="40" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="750" y="315" text-anchor="middle" fill="#111827" font-size="12">成本分析</text>
  <!-- Layer 4: Scheduler Layer -->
  <rect x="40" y="360" width="880" height="50" rx="6" fill="#faf5ff" fill-opacity="0.5" stroke="#e9d5ff" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="52" y="378" fill="#6b7280" font-size="10" font-weight="600">调度层 (robfig/cron)</text>
  <rect x="280" y="368" width="400" height="36" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="480" y="390" text-anchor="middle" fill="#111827" font-size="12">定时任务调度器：资源同步 / 账单同步 / 状态检测</text>
  <!-- Layer 5: Storage Layer -->
  <rect x="40" y="430" width="880" height="90" rx="6" fill="#fff7ed" fill-opacity="0.5" stroke="#fed7aa" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="52" y="448" fill="#6b7280" font-size="10" font-weight="600">数据存储层</text>
  <ellipse cx="280" cy="450" rx="50" ry="15" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="230" y="450" width="100" height="55" fill="#ffffff" stroke="none"/>
  <line x1="230" y1="450" x2="230" y2="505" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="330" y1="450" x2="330" y2="505" stroke="#d1d5db" stroke-width="1.5"/>
  <ellipse cx="280" cy="505" rx="50" ry="15" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="280" y="480" text-anchor="middle" fill="#111827" font-size="13">MySQL 8.0</text>
  <text x="280" y="518" text-anchor="middle" fill="#6b7280" font-size="9">资源/用户/账单</text>
  <ellipse cx="480" cy="450" rx="50" ry="15" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="430" y="450" width="100" height="55" fill="#ffffff" stroke="none"/>
  <line x1="430" y1="450" x2="430" y2="505" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="530" y1="450" x2="530" y2="505" stroke="#d1d5db" stroke-width="1.5"/>
  <ellipse cx="480" cy="505" rx="50" ry="15" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="480" y="480" text-anchor="middle" fill="#111827" font-size="13">Redis 7.x</text>
  <text x="480" y="518" text-anchor="middle" fill="#6b7280" font-size="9">Token/缓存/锁</text>
  <rect x="680" y="455" width="180" height="40" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="770" y="480" text-anchor="middle" fill="#111827" font-size="12">JSON字段扩展</text>
  <text x="770" y="492" text-anchor="middle" fill="#6b7280" font-size="9">Tags/Attributes</text>
  <!-- Layer 6: Collection Layer -->
  <rect x="40" y="540" width="880" height="60" rx="6" fill="#f0fdfa" fill-opacity="0.5" stroke="#99f6e4" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="52" y="558" fill="#6b7280" font-size="10" font-weight="600">数据采集层</text>
  <rect x="160" y="550" width="160" height="40" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="240" y="575" text-anchor="middle" fill="#111827" font-size="12">AWS SDK采集器</text>
  <rect x="340" y="550" width="160" height="40" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="420" y="575" text-anchor="middle" fill="#111827" font-size="12">阿里云SDK采集</text>
  <rect x="520" y="550" width="160" height="40" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="600" y="575" text-anchor="middle" fill="#111827" font-size="12">腾讯云SDK采集</text>
  <rect x="700" y="550" width="160" height="40" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="780" y="575" text-anchor="middle" fill="#111827" font-size="12">IDC手动录入</text>
  <!-- Layer 7: External Layer -->
  <rect x="40" y="620" width="880" height="60" rx="6" fill="#f9fafb" fill-opacity="0.5" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="52" y="638" fill="#6b7280" font-size="10" font-weight="600">外部系统层</text>
  <rect x="160" y="630" width="140" height="40" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="230" y="655" text-anchor="middle" fill="#111827" font-size="12">AWS Cloud</text>
  <rect x="320" y="630" width="140" height="40" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="390" y="655" text-anchor="middle" fill="#111827" font-size="12">阿里云</text>
  <rect x="480" y="630" width="140" height="40" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="550" y="655" text-anchor="middle" fill="#111827" font-size="12">腾讯云</text>
  <rect x="640" y="630" width="140" height="40" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="710" y="655" text-anchor="middle" fill="#111827" font-size="12">IDC机房</text>
  <rect x="800" y="630" width="100" height="40" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="850" y="655" text-anchor="middle" fill="#111827" font-size="11">通知渠道</text>
  <!-- Vertical flow arrows -->
  <line x1="480" y1="104" x2="480" y2="135" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="185" x2="480" y2="200" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="340" x2="480" y2="360" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="410" x2="480" y2="430" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="520" x2="480" y2="540" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="600" x2="480" y2="620" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- Legend -->
  <g transform="translate(40, 690)">
    <line x1="0" y1="8" x2="30" y2="8" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <text x="36" y="12" fill="#6b7280" font-size="10">请求/数据流</text>
    <line x1="120" y1="8" x2="150" y2="8" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <text x="156" y="12" fill="#6b7280" font-size="10">外部数据采集</text>
  </g>
</svg>