<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="960" height="600" fill="#ffffff"/>
  <text x="480" y="30" text-anchor="middle" fill="#111827" font-size="18" font-weight="600">API权限验证流程</text>
  <rect x="360" y="50" width="240" height="45" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <circle cx="380" cy="72" r="10" fill="#bfdbfe"/>
  <text x="480" y="78" text-anchor="middle" fill="#111827" font-size="12">用户发起API请求</text>
  <text x="480" y="92" text-anchor="middle" fill="#6b7280" font-size="9">Authorization: Bearer {JWT}</text>
  <line x1="480" y1="95" x2="480" y2="130" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="300" y="130" width="360" height="60" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="480" y="155" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">JWT认证中间件</text>
  <text x="480" y="172" text-anchor="middle" fill="#6b7280" font-size="10">提取Token → 解析user_id/domain_id</text>
  <text x="480" y="185" text-anchor="middle" fill="#6b7280" font-size="10">Redis验证Token有效性</text>
  <line x1="660" y1="160" x2="750" y2="160" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="750" y="140" width="100" height="40" rx="6" fill="#fee2e2" stroke="#fecaca" stroke-width="1"/>
  <text x="800" y="165" text-anchor="middle" fill="#dc2626" font-size="11">401</text>
  <line x1="480" y1="190" x2="480" y2="230" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="300" y="230" width="360" height="70" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="480" y="255" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">权限检查中间件</text>
  <text x="480" y="272" text-anchor="middle" fill="#6b7280" font-size="10">查询用户角色 (user_roles)</text>
  <text x="480" y="285" text-anchor="middle" fill="#6b7280" font-size="10">查询角色权限 (role_permissions)</text>
  <text x="480" y="298" text-anchor="middle" fill="#16a34a" font-size="9">管理员→跳过检查</text>
  <line x1="660" y1="265" x2="750" y2="265" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="750" y="245" width="100" height="40" rx="6" fill="#fee2e2" stroke="#fecaca" stroke-width="1"/>
  <text x="800" y="270" text-anchor="middle" fill="#dc2626" font-size="11">403</text>
  <line x1="480" y1="300" x2="480" y2="340" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="250" y="340" width="460" height="80" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="480" y="365" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">项目隔离验证</text>
  <text x="480" y="382" text-anchor="middle" fill="#6b7280" font-size="10">获取用户所属项目列表</text>
  <text x="480" y="395" text-anchor="middle" fill="#6b7280" font-size="10">注入 WHERE project_id IN (user_projects)</text>
  <text x="480" y="410" text-anchor="middle" fill="#16a34a" font-size="9">系统管理员/审计员 → 跳过隔离</text>
  <line x1="480" y1="420" x2="480" y2="450" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="250" y="450" width="460" height="60" rx="8" fill="#dbeafe" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="480" y="472" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">Handler处理请求</text>
  <text x="480" y="490" text-anchor="middle" fill="#6b7280" font-size="10">执行业务逻辑</text>
  <text x="480" y="505" text-anchor="middle" fill="#6b7280" font-size="10">记录审计日志 (audit_logs)</text>
  <line x1="480" y1="510" x2="480" y2="540" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="360" y="540" width="240" height="40" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="480" y="565" text-anchor="middle" fill="#16a34a" font-size="12">返回响应</text>
  <rect x="40" y="130" width="200" height="170" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="52" y="148" fill="#6b7280" font-size="10" font-weight="600">权限模型</text>
  <text x="52" y="168" fill="#111827" font-size="9">格式: module:resource:action</text>
  <text x="52" y="185" fill="#6b7280" font-size="8">示例:</text>
  <text x="52" y="200" fill="#6b7280" font-size="8">• compute:vm:list</text>
  <text x="52" y="213" fill="#6b7280" font-size="8">• iam:user:create</text>
  <text x="52" y="226" fill="#6b7280" font-size="8">• bill:cost:view</text>
  <text x="52" y="245" fill="#111827" font-size="9">三层隔离:</text>
  <text x="52" y="260" fill="#6b7280" font-size="8">• sys_* 全局权限</text>
  <text x="52" y="273" fill="#6b7280" font-size="8">• domain_* 域权限</text>
  <text x="52" y="286" fill="#6b7280" font-size="8">• project_* 项目权限</text>
  <g transform="translate(700, 550)">
    <line x1="0" y1="12" x2="30" y2="12" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <text x="36" y="16" fill="#6b7280" font-size="9">正常流程</text>
    <line x1="100" y1="12" x2="130" y2="12" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
    <text x="136" y="16" fill="#6b7280" font-size="9">拒绝</text>
  </g>
</svg>