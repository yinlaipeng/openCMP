version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: opencmp-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: opencmp123
      MYSQL_DATABASE: opencmp
      MYSQL_USER: opencmp
      MYSQL_PASSWORD: opencmp123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
